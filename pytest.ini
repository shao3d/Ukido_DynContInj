[pytest]
testpaths = tests

# Default suite is intentionally offline and deterministic.
# Live/manual/legacy scripts stay in the repo, but are not collected by default.
python_files =
    test_config_contract.py
    test_critical_fixes.py
    test_completed_actions.py
    test_security_surface.py
    test_zhvanetsky.py

addopts = --tb=short
